name: Validate Content
on:
  pull_request:
    paths:
      - "content/frameworks/**/*.mdx"
      - "content/symptoms.json"
  push:
    branches: [main, master]
    paths:
      - "content/frameworks/**/*.mdx"
      - "content/symptoms.json"
      - "src/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Validate frontmatter
        run: node scripts/validate-frontmatter.mjs
      - name: Check symptoms ↔ MDX sync
        run: node scripts/check-symptoms-sync.mjs
